name = "aneko-novel"
compatibility_date = "2024-06-05"
compatibility_flags = ["nodejs_compat"]

main = "worker/src/index.ts"

# 静态资源 - 前端构建产物
[assets]
directory = "./dist/client"
binding = "ASSETS"
run_worker_first = true

# R2 存储桶 - 存储小说文件和封面
[[r2_buckets]]
binding = "NOVEL_BUCKET"
bucket_name = "novel-files"
preview_bucket_name = "novel-files-preview"

# KV 命名空间 - 存储小说元数据
[[kv_namespaces]]
binding = "NOVEL_META"
id = "your-novel-meta-kv-id"
preview_id = "your-novel-meta-kv-preview-id"

# KV 命名空间 - 存储阅读进度
[[kv_namespaces]]
binding = "READING_PROGRESS"
id = "your-reading-progress-kv-id"
preview_id = "your-reading-progress-kv-preview-id"

# 环境变量
[vars]
ENVIRONMENT = "production"

# 本地开发配置
[dev]
ip = "0.0.0.0"
port = 8787
local_protocol = "http"
